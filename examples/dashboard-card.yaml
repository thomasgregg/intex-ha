# Intex SX2100 pool dashboard card
# Paste into a manual card. Schedules appear automatically: each slot is
# wrapped in a conditional card that only shows when the slot is in use
# (hours > 0). Requires no custom frontend cards.
type: vertical-stack
cards:
  - type: tile
    entity: switch.intex_pool_pump
    name: Pool Pump
    icon: mdi:pump
    features:
      - type: toggle
  - type: horizontal-stack
    cards:
      - type: tile
        entity: sensor.intex_pool_mode
        name: Mode
      - type: tile
        entity: binary_sensor.intex_pool_problem
        name: Health
  - type: horizontal-stack
    cards:
      - type: tile
        entity: button.intex_pool_start_fp
        name: Boost (FP)
        icon: mdi:rocket-launch
        hide_state: true
        tap_action:
          action: perform-action
          perform_action: button.press
          target:
            entity_id: button.intex_pool_start_fp
      - type: tile
        entity: number.intex_pool_start_fp_hours
        name: FP hours
        features:
          - type: numeric-input
            style: buttons
  - type: conditional
    conditions:
      - condition: numeric_state
        entity: number.intex_pool_slot_1_hours
        above: 0
    card:
      type: entities
      title: Schedule 1
      entities:
        - entity: switch.intex_pool_slot_1
          name: Enabled
          secondary_info: attribute
          attribute: summary
        - entity: time.intex_pool_slot_1_start
          name: Start
        - entity: number.intex_pool_slot_1_hours
          name: Hours
        - entity: text.intex_pool_slot_1_days
          name: Days
