# Intex SX2100 pool dashboard card
# Controls use built-in card types. The schedule sections use the HACS
# "Expander Card" (MelleD/lovelace-expander-card) so each schedule collapses
# behind a header. Install it from HACS (search "Expander Card") first.
# Each slot is wrapped in a conditional card, so only slots in use appear,
# and each has a compact Delete row that clears that slot.
type: vertical-stack
cards:
  - type: horizontal-stack
    cards:
      - type: tile
        entity: switch.intex_pool_pump
        name: Pool Pump
        icon: mdi:pump
        features:
          - type: toggle
      - type: tile
        entity: sensor.intex_pool_working_time
        name: Time remaining
  - type: horizontal-stack
    cards:
      - type: tile
        entity: sensor.intex_pool_mode
        name: Mode
      - type: tile
        entity: binary_sensor.intex_pool_problem
        name: Health
      - type: tile
        entity: button.intex_pool_refresh
        name: Refresh
        hide_state: true
        tap_action:
          action: perform-action
          perform_action: button.press
          target:
            entity_id: button.intex_pool_refresh
  - type: horizontal-stack
    cards:
      - type: tile
        entity: button.intex_pool_start_fp
        name: Boost (FP)
        icon: mdi:rocket-launch
        hide_state: true
        tap_action:
          action: perform-action
          perform_action: button.press
          target:
            entity_id: button.intex_pool_start_fp
      - type: tile
        entity: number.intex_pool_start_fp_hours
        name: FP hours
        features:
          - type: numeric-input
            style: buttons
  - type: conditional
    conditions:
      - condition: numeric_state
        entity: number.intex_pool_slot_1_hours
        above: 0
    card:
      type: custom:expander-card
      title: Schedule 1
      expanded: false
      title-card-clickable: true
      cards:
        - type: entities
          entities:
            - entity: switch.intex_pool_slot_1
              name: Enabled
              secondary_info: attribute
              attribute: summary
            - entity: time.intex_pool_slot_1_start
              name: Start
            - entity: number.intex_pool_slot_1_hours
              name: Hours
            - entity: text.intex_pool_slot_1_days
              name: Days
            - type: call-service
              name: " "
              action_name: Delete schedule
              service: intex_sx2100.clear_schedule_slot
              data:
                slot: 1
              confirmation:
                text: Delete schedule 1?
